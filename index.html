<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            background:#f4f4f4;
        }

        .sidebar{
            width:220px;
            height:100vh;
            background:#2c3e50;
            color:white;
            padding:20px;
        }

        .sidebar h2{
            text-align:center;
            margin-bottom:20px;
        }

        .sidebar ul{
            list-style:none;
        }

        .sidebar ul li{
            padding:12px;
            cursor:pointer;
        }

        .sidebar ul li:hover{
            background:#34495e;
        }

        .main{
            flex:1;
            padding:20px;
        }

        .header{
            background:white;
            padding:15px;
            border-radius:10px;
            margin-bottom:20px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        .card h3{
            margin-bottom:10px;
        }

        .card p{
            font-size:24px;
            font-weight:bold;
            color:#3498db;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Dashboard</h2>
        <ul>
            <li>Home</li>
            <li>Users</li>
            <li>Reports</li>
            <li>Settings</li>
            <li>Logout</li>
        </ul>
    </div>

    <div class="main">
        <div class="header">
            <h1>Welcome Admin</h1>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Total Users</h3>
                <p>120</p>
            </div>

            <div class="card">
                <h3>Orders</h3>
                <p>85</p>
            </div>

            <div class="card">
                <h3>Revenue</h3>
                <p>₹50K</p>
            </div>

            <div class="card">
                <h3>Products</h3>
                <p>40</p>
            </div>
        </div>
    </div>

</body>
</html>
